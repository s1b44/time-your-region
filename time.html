<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
            --header-text: #ffffff; --blue: #58a6ff; --green: #7ee787; --yellow: #f1e05a;
            --red: #ff7b72; --night-bg: #090c10; --ani: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        body.light-theme {
            --bg: #ffffff; --panel: #f6f8fa; --border: #d0d7de; --text: #24292f;
            --header-text: #1b1f24; --blue: #0969da; --green: #1a7f37; --yellow: #9a6700;
            --red: #cf222e; --night-bg: #f0f2f5;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0 15px 40px; transition: background 0.3s; overflow-y: scroll; }
        .header { position: sticky; top: 0; background: var(--bg); width: 100%; z-index: 100; padding: 20px 0; text-align: center; border-bottom: 1px solid var(--border); }
        .controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .ctrl-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .reset-btn { color: var(--red); border-color: var(--red); visibility: hidden; opacity: 0; transition: 0.3s; }
        .reset-btn.visible { visibility: visible; opacity: 1; }

        #main-time { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 800; color: var(--header-text); margin: 0; line-height: 1.1; }
        #main-time-12 { font-size: 1.2rem; color: var(--green); font-family: monospace; margin-top: 4px; }
        #active-city-label { color: var(--blue); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; margin-top: 8px; letter-spacing: 1px; }
        
        .slider-container { width: 95%; max-width: 550px; margin: 20px auto 10px; }
        #time-slider { width: 100%; cursor: pointer; accent-color: var(--blue); height: 6px; }
        .travel-info { font-size: 13px; color: var(--yellow); font-weight: bold; height: 18px; margin-bottom: 6px; }

        .tabs { display: flex; gap: 6px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .tab-btn.active { background: var(--blue); color: #000; border-color: var(--blue); }

        .search-box { width: 90%; max-width: 550px; background: var(--panel); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: var(--text); margin: 20px auto 0; display: block; outline: none; }

        /* Форма своего города */
        #custom-city-form { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 16px; width: 90%; max-width: 450px; margin: 20px auto; display: none; flex-direction: column; gap: 10px; animation: slideUp 0.4s forwards; }
        #custom-city-form input, #custom-city-form select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; }
        #custom-city-form button { background: var(--blue); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; margin: 30px auto 0; }
        .city-card { background: var(--panel); border: 1px solid var(--border); padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; animation: slideUp var(--ani) forwards; opacity: 0; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .city-card.active-city { border: 2px solid var(--blue); background: rgba(88, 166, 255, 0.05); }
        .city-card.is-night { background: var(--night-bg); }
        .city-card.is-weekend { border-top: 3px solid var(--red); }
        .city-card.is-work { border-left: 4px solid var(--green); }
        
        .status-badge { font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; font-weight: bold; }
        .badge-work { background: rgba(126, 231, 135, 0.1); color: var(--green); }
        .badge-sleep { background: rgba(255, 123, 114, 0.1); color: #ff7b72; }
        .badge-weekend { background: var(--red); color: #fff; margin-left: 5px; }

        .matrix-info { font-size: 10px; color: var(--blue); opacity: 0.8; margin-top: 4px; display: block; font-weight: bold; }

        .time-block { text-align: right; margin-right: 15px; pointer-events: none; min-width: 90px; }
        .t24 { font-family: 'JetBrains Mono', monospace; color: var(--green); font-size: 1.4rem; font-weight: 800; display: block; }
        .t12 { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 0.8rem; opacity: 0.7; display: block; }
        
        .action-btns { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); cursor: pointer; padding: 8px; border-radius: 10px; transition: 0.2s; display: flex; align-items: center; }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .fav-btn.active { color: var(--yellow); border-color: var(--yellow); }
        .del-btn:hover { border-color: var(--red); color: var(--red); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 900; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast">COPIED</div>

<div class="header">
    <div class="controls">
        <button class="ctrl-btn reset-btn" id="reset-btn" onclick="resetTime()">RESET</button>
        <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn">RU</button>
        <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    </div>
    <div id="main-time">00:00:00</div>
    <div id="main-time-12">--:--:-- --</div>
    <div id="active-city-label">ЛОКАЛЬНОЕ ВРЕМЯ</div>
    
    <div class="slider-container">
        <div class="travel-info" id="travel-info">LIVE</div>
        <input type="range" id="time-slider" min="0" max="1439" step="1" onmousedown="isInteracting=true" onmouseup="isInteracting=false" oninput="handleSlider(this.value)">
    </div>
    
    <div class="tabs" id="tabs-container"></div>
    <input type="text" id="search" class="search-box" oninput="renderGrid()">
</div>

<div id="custom-city-form">
    <input type="text" id="custom-name" placeholder="Название (напр. Офис или Дача)">
    <select id="custom-zone"></select>
    <button onclick="saveCustomCity()">ДОБАВИТЬ В МОЙ СПИСОК</button>
</div>

<div class="grid" id="grid"></div>

<script>
    const i18n = {
        ru: { search: "Поиск города...", travel: "ПРОСМОТР:", now: "В ЭФИРЕ", work: "РАБОТА", sleep: "СОН", day: "ДЕНЬ", weekend: "ВЫХОДНОЙ", vs: "от", tabs: ["РФ", "ЕВРОПА", "АЗИЯ", "АМЕРИКА", "⭐", "СВОЙ"], copied: "СКОПИРОВАНО!" },
        en: { search: "Search...", travel: "TRAVEL:", now: "LIVE", work: "WORK", sleep: "SLEEP", day: "DAY", weekend: "WEEKEND", vs: "from", tabs: ["RUS", "EURO", "ASIA", "USA", "⭐", "MY"], copied: "COPIED!" }
    };

    const zones = {
        Russia: ["Europe/Kaliningrad", "Europe/Moscow", "Europe/Samara", "Europe/Volgograd", "Europe/Kirov", "Europe/Astrakhan", "Europe/Saratov", "Europe/Ulyanovsk", "Asia/Yekaterinburg", "Asia/Omsk", "Asia/Novosibirsk", "Asia/Barnaul", "Asia/Tomsk", "Asia/Novokuznetsk", "Asia/Krasnoyarsk", "Asia/Irkutsk", "Asia/Chita", "Asia/Yakutsk", "Asia/Khandyga", "Asia/Vladivostok", "Asia/Ust-Nera", "Asia/Magadan", "Asia/Sakhalin", "Asia/Srednekolymsk", "Asia/Kamchatka", "Asia/Anadyr"],
        Europe: ["Europe/London", "Europe/Paris", "Europe/Berlin", "Europe/Rome", "Europe/Madrid", "Europe/Warsaw", "Europe/Prague", "Europe/Kyiv", "Europe/Minsk", "Europe/Istanbul", "Europe/Athens", "Europe/Stockholm", "Europe/Vienna", "Europe/Zurich", "Europe/Brussels", "Europe/Amsterdam", "Europe/Oslo", "Europe/Helsinki", "Europe/Riga", "Europe/Vilnius", "Europe/Tallinn", "Europe/Lisbon", "Europe/Belgrade", "Europe/Budapest"],
        Asia: ["Asia/Dubai", "Asia/Tashkent", "Asia/Almaty", "Asia/Bishkek", "Asia/Dushanbe", "Asia/Singapore", "Asia/Shanghai", "Asia/Hong_Kong", "Asia/Tokyo", "Asia/Seoul", "Asia/Bangkok", "Asia/Jakarta", "Asia/Manila", "Asia/Kolkata", "Asia/Ho_Chi_Minh", "Asia/Jerusalem", "Asia/Riyadh", "Asia/Kathmandu", "Asia/Colombo", "Asia/Kuala_Lumpur", "Asia/Taipei"],
        America: ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Toronto", "America/Mexico_City", "America/Sao_Paulo", "America/Argentina/Buenos_Aires", "America/Vancouver", "America/Phoenix", "America/Bogota", "America/Santiago", "America/Lima", "America/Anchorage", "America/Honolulu"]
    };

    let lang = localStorage.getItem('lang') || 'ru';
    let theme = localStorage.getItem('theme') || 'dark';
    let favorites = JSON.parse(localStorage.getItem('fav_v29')) || [];
    let customCities = JSON.parse(localStorage.getItem('custom_v29')) || [];
    let currentRegion = 'Russia';
    let timeShiftMinutes = 0;
    let isInteracting = false;
    let activeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    let activeCityName = "ЛОКАЛЬНОЕ ВРЕМЯ";

    // Инициализация селектора часовых поясов
    const select = document.getElementById('custom-zone');
    Intl.supportedValuesOf('timeZone').forEach(tz => {
        const opt = document.createElement('option');
        opt.value = tz; opt.textContent = tz;
        if(tz === activeZone) opt.selected = true;
        select.appendChild(opt);
    });

    function toggleLang() { lang = lang === 'ru' ? 'en' : 'ru'; localStorage.setItem('lang', lang); applyLang(); renderGrid(); }
    function applyLang() { document.getElementById('lang-btn').textContent = lang.toUpperCase(); document.getElementById('search').placeholder = i18n[lang].search; renderTabs(); }
    function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', theme); document.body.classList.toggle('light-theme', theme === 'light'); document.getElementById('theme-btn').textContent = theme === 'light' ? '☀️' : '🌙'; }

    function handleSlider(val) {
        timeShiftMinutes = val - (new Date().getHours() * 60 + new Date().getMinutes());
        document.getElementById('travel-info').textContent = `${i18n[lang].travel} ${Math.floor(val/60).toString().padStart(2,'0')}:${(val%60).toString().padStart(2,'0')}`;
        document.getElementById('reset-btn').classList.add('visible');
        update();
    }

    function resetTime() { timeShiftMinutes = 0; document.getElementById('reset-btn').classList.remove('visible'); update(); }

    function saveCustomCity() {
        const name = document.getElementById('custom-name').value || 'Мой город';
        const zone = document.getElementById('custom-zone').value;
        customCities.push({ name, zone, id: Date.now() });
        localStorage.setItem('custom_v29', JSON.stringify(customCities));
        document.getElementById('custom-name').value = '';
        renderGrid();
    }

    function deleteCustom(id) {
        customCities = customCities.filter(c => c.id !== id);
        localStorage.setItem('custom_v29', JSON.stringify(customCities));
        renderGrid();
    }

    function getAdjustedDate(zone) {
        try {
            let date = new Date();
            date = new Date(date.getTime() + timeShiftMinutes * 60000);
            return new Date(date.toLocaleString('en-US', { timeZone: zone }));
        } catch(e) { return new Date(); }
    }

    function update() {
        if (!isInteracting && Math.abs(timeShiftMinutes) < 0.5) {
            const now = new Date();
            document.getElementById('time-slider').value = now.getHours() * 60 + now.getMinutes();
            document.getElementById('travel-info').textContent = i18n[lang].now;
            document.getElementById('reset-btn').classList.remove('visible');
            timeShiftMinutes = 0;
        }
        const mainDate = getAdjustedDate(activeZone);
        document.getElementById('main-time').textContent = mainDate.toLocaleTimeString(lang === 'ru' ? 'ru-RU' : 'en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('main-time-12').textContent = mainDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

        document.querySelectorAll('.city-card').forEach(card => {
            const d = getAdjustedDate(card.dataset.zone);
            const h = d.getHours();
            const day = d.getDay();
            const isWeekend = (day === 0 || day === 6);
            
            card.querySelector('.t24').textContent = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            card.querySelector('.t12').textContent = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            
            const activeDate = getAdjustedDate(activeZone);
            const diffHours = Math.round((d - activeDate) / 3600000);
            card.querySelector('.matrix-info').textContent = `${diffHours > 0 ? '+'+diffHours : diffHours}ч ${i18n[lang].vs} ${activeCityName}`;

            card.classList.toggle('is-night', h >= 22 || h < 7);
            card.classList.toggle('is-work', h >= 9 && h < 18);
            card.classList.toggle('is-weekend', isWeekend);

            const badge = card.querySelector('.status-badge');
            badge.textContent = h >= 9 && h < 18 ? i18n[lang].work : (h >= 22 || h < 7 ? i18n[lang].sleep : i18n[lang].day);
            badge.className = `status-badge ${h >= 9 && h < 18 ? 'badge-work' : (h >= 22 || h < 7 ? 'badge-sleep' : '')}`;
            
            const wBadge = card.querySelector('.weekend-badge');
            wBadge.style.display = isWeekend ? 'inline-block' : 'none';
            wBadge.textContent = i18n[lang].weekend;
        });
    }

    function renderGrid() {
        const search = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        document.getElementById('custom-city-form').style.display = currentRegion === 'Custom' ? 'flex' : 'none';

        let list = [];
        if(currentRegion === 'Favorites') list = favorites.map(z => ({zone: z, name: z.split('/').pop()}));
        else if(currentRegion === 'Custom') list = customCities;
        else list = (zones[currentRegion] || []).map(z => ({zone: z, name: z.split('/').pop()}));

        list.forEach((item, index) => {
            const name = item.name.replace(/_/g, ' ');
            if (!name.toLowerCase().includes(search)) return;

            const card = document.createElement('div');
            card.className = `city-card ${item.zone === activeZone ? 'active-city' : ''}`;
            card.style.animationDelay = `${index * 0.02}s`;
            card.dataset.zone = item.zone;
            card.onclick = () => { activeZone = item.zone; activeCityName = name; document.getElementById('active-city-label').textContent = name; renderGrid(); };
            
            card.innerHTML = `
                <div style="flex:1">
                    <span class="city-name">${name}</span>
                    <span class="status-badge"></span><span class="status-badge badge-weekend weekend-badge"></span>
                    <span class="matrix-info"></span>
                </div>
                <div class="action-btns">
                    <div class="time-block"><span class="t24">--:--</span><span class="t12">--:-- --</span></div>
                    <button class="icon-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${name}: ' + this.parentElement.querySelector('.t24').textContent)">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    </button>
                    ${currentRegion === 'Custom' ? 
                        `<button class="icon-btn del-btn" onclick="event.stopPropagation(); deleteCustom(${item.id})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` :
                        `<button class="icon-btn fav-btn ${favorites.includes(item.zone)?'active':''}" onclick="event.stopPropagation(); toggleFav('${item.zone}')"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>`
                    }
                </div>
            `;
            grid.appendChild(card);
        });
        update();
    }

    function toggleFav(zone) {
        favorites = favorites.includes(zone) ? favorites.filter(f => f !== zone) : [...favorites, zone];
        localStorage.setItem('fav_v29', JSON.stringify(favorites));
        renderGrid();
    }

    function renderTabs() {
        const ids = ['Russia', 'Europe', 'Asia', 'America', 'Favorites', 'Custom'];
        document.getElementById('tabs-container').innerHTML = ids.map((id, i) => `
            <button class="tab-btn ${currentRegion === id ? 'active' : ''}" onclick="currentRegion='${id}';renderGrid()">${i18n[lang].tabs[i]}</button>
        `).join('');
    }

    applyLang();
    if (theme === 'light') document.body.classList.add('light-theme');
    renderGrid();
    setInterval(update, 1000);
</script>
</body>
</html>
